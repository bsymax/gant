# 本地开发用 PostgreSQL（手册 Step 02）
# 启动：docker compose up -d
# 停止：docker compose down（数据保留在卷 gant_pg_data）
# 若镜像拉取慢：Docker Desktop → Settings → Docker Engine 配置 registry-mirrors（或使用境内镜像仓库地址）

services:
  postgres:
    image: postgres:16-alpine
    container_name: gant-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gant
      POSTGRES_PASSWORD: gant_dev_password
      POSTGRES_DB: gant
    volumes:
      - gant_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gant -d gant"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gant_pg_data:
